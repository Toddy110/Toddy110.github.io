<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Database relational model cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="100%" stop-color="#EEF4FA"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5A4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#8AA0B8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.42" stroke="#D4DEE9" stroke-width="1">
    <path d="M0 120 H1600"/>
    <path d="M0 220 H1600"/>
    <path d="M0 320 H1600"/>
    <path d="M0 420 H1600"/>
    <path d="M0 520 H1600"/>
    <path d="M0 620 H1600"/>
    <path d="M0 720 H1600"/>
    <path d="M180 0 V900"/>
    <path d="M440 0 V900"/>
    <path d="M700 0 V900"/>
    <path d="M960 0 V900"/>
    <path d="M1220 0 V900"/>
    <path d="M1480 0 V900"/>
  </g>

  <g stroke="url(#line)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.88">
    <path d="M580 295 H650"/>
    <path d="M950 295 H1020"/>
    <path d="M800 355 V470"/>
    <path d="M590 560 H860"/>
    <path d="M430 355 C430 430, 500 470, 590 470"/>
    <path d="M1170 355 C1170 430, 1100 470, 1010 470"/>
  </g>

  <g fill="#14B8A6" opacity="0.9">
    <circle cx="650" cy="295" r="4"/>
    <circle cx="950" cy="295" r="4"/>
    <circle cx="800" cy="470" r="4"/>
    <circle cx="590" cy="560" r="4"/>
    <circle cx="860" cy="560" r="4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="190" width="300" height="165" rx="16" fill="url(#card)" stroke="#93C5FD" stroke-opacity="0.95"/>
    <rect x="650" y="190" width="300" height="165" rx="16" fill="url(#card)" stroke="#93C5FD" stroke-opacity="0.95"/>
    <rect x="1020" y="190" width="300" height="165" rx="16" fill="url(#card)" stroke="#93C5FD" stroke-opacity="0.95"/>

    <rect x="440" y="470" width="300" height="165" rx="16" fill="url(#card)" stroke="#5EEAD4" stroke-opacity="0.95"/>
    <rect x="860" y="470" width="300" height="165" rx="16" fill="url(#card)" stroke="#5EEAD4" stroke-opacity="0.95"/>
  </g>

  <g font-family="Inter, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#1F2937">
    <text x="306" y="232" font-size="28" font-weight="700">MOVIES</text>
    <text x="306" y="266" font-size="18" opacity="0.78">title · year · length</text>
    <text x="306" y="294" font-size="18" opacity="0.78">genre · studioName</text>
    <text x="306" y="322" font-size="18" opacity="0.78">producerCert</text>

    <text x="676" y="232" font-size="28" font-weight="700">MOVIESTAR</text>
    <text x="676" y="266" font-size="18" opacity="0.78">name · address</text>
    <text x="676" y="294" font-size="18" opacity="0.78">gender · birthdate</text>

    <text x="1046" y="232" font-size="28" font-weight="700">MOVIEEXEC</text>
    <text x="1046" y="266" font-size="18" opacity="0.78">cert · name</text>
    <text x="1046" y="294" font-size="18" opacity="0.78">address · netWorth</text>

    <text x="466" y="512" font-size="28" font-weight="700">STARSIN</text>
    <text x="466" y="546" font-size="18" opacity="0.78">movieTitle · movieYear</text>
    <text x="466" y="574" font-size="18" opacity="0.78">starName</text>

    <text x="886" y="512" font-size="28" font-weight="700">STUDIO</text>
    <text x="886" y="546" font-size="18" opacity="0.78">name · address</text>
    <text x="886" y="574" font-size="18" opacity="0.78">presCert</text>
  </g>

</svg>
