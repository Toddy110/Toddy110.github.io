<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Database relational model cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.12">
    <circle cx="1350" cy="130" r="220" fill="#22d3ee"/>
    <circle cx="250" cy="760" r="180" fill="#3b82f6"/>
  </g>

  <g stroke="#334155" stroke-width="2" opacity="0.45">
    <path d="M250 300 C430 240, 540 350, 700 310" fill="none"/>
    <path d="M700 310 C860 270, 970 370, 1170 320" fill="none"/>
    <path d="M370 560 C580 500, 730 620, 980 560" fill="none"/>
    <path d="M980 560 C1100 530, 1220 620, 1360 580" fill="none"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="210" y="220" rx="18" ry="18" width="320" height="170" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="640" y="220" rx="18" ry="18" width="320" height="170" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="1070" y="220" rx="18" ry="18" width="320" height="170" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>

    <rect x="430" y="510" rx="18" ry="18" width="320" height="170" fill="url(#card)" stroke="#22d3ee" stroke-opacity="0.6"/>
    <rect x="850" y="510" rx="18" ry="18" width="320" height="170" fill="url(#card)" stroke="#22d3ee" stroke-opacity="0.6"/>
  </g>

  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.85">
    <path d="M530 305 L640 305"/>
    <path d="M960 305 L1070 305"/>
    <path d="M530 340 C610 430, 690 500, 750 560"/>
    <path d="M960 340 C930 430, 900 500, 850 560"/>
    <path d="M750 595 L850 595"/>
  </g>

  <g fill="#e5e7eb" font-family="Inter, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
    <text x="240" y="265" font-size="30" font-weight="700">MOVIES</text>
    <text x="240" y="300" font-size="20" opacity="0.9">title · year · genre</text>
    <text x="240" y="330" font-size="20" opacity="0.9">studioName · producerCert</text>

    <text x="670" y="265" font-size="30" font-weight="700">MOVIESTAR</text>
    <text x="670" y="300" font-size="20" opacity="0.9">name · gender · birthdate</text>

    <text x="1100" y="265" font-size="30" font-weight="700">MOVIEEXEC</text>
    <text x="1100" y="300" font-size="20" opacity="0.9">cert · name · netWorth</text>

    <text x="460" y="555" font-size="30" font-weight="700">STARSIN</text>
    <text x="460" y="590" font-size="20" opacity="0.9">movieTitle · movieYear · starName</text>

    <text x="880" y="555" font-size="30" font-weight="700">STUDIO</text>
    <text x="880" y="590" font-size="20" opacity="0.9">name · address · presCert</text>
  </g>

  <g fill="#bae6fd" font-family="Inter, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" text-anchor="middle">
    <text x="800" y="775" font-size="52" font-weight="800">数据库基本概念与关系数据模型</text>
    <text x="800" y="820" font-size="28" opacity="0.9">Database Fundamentals · Relational Data Model</text>
  </g>
</svg>
